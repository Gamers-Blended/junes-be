services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: junes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    ports:
      - "9092:9092"
      - "9093:9093"  # For controller
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - app-network

  junes-app:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        - DOCKER_GID=${HOST_DOCKER_GID:-999}
    image: junes-app:${BUILD_NUMBER:-latest}
    restart: always
    environment:
      - MAILGUN_API_KEY_2
      - MAILGUN_DOMAIN
      - MAILGUN_FROM_EMAIL
      - IMAGE_URL_PREFIX
      - JWT_ACCESS_SECRET
      - JWT_EMAIL_SECRET
      - RABBITMQ_HOST
      - RABBITMQ_PORT
      - RABBITMQ_USERNAME
      - RABBITMQ_PASSWORD
      - KAFKA_BOOTSTRAP_SERVERS
      - KAFKA_CONSUMER_GROUP
      - POSTGRES_URL
      - POSTGRES_USERNAME
      - POSTGRES_PASSWORD
      - MONGODB_URI
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_CONFIG_IMPORT=file:/config/application.properties
    volumes:
      - ${HOST_WORKSPACE}:/app
      - ${PROD_CONFIG}:/config/application.properties:ro
      - maven-cache:/home/jenkins/.m2 # Persist dependencies
    working_dir: /app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mongodb
      - rabbitmq
      - kafka
      - redis
    networks:
      - app-network

volumes:
  postgres_data:
  mongodb_data:
  pgadmin_data:
  redis-data:
  rabbitmq_data:
  kafka-data:
  maven-cache:
    driver: local

networks:
  app-network:
    external: true